name: Run Selenium Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          cache: maven
          distribution: "temurin"

          

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@latest

      - name: Verify Chrome
        run: chrome --version

      - name: Run Tests
        run: mvn clean test
